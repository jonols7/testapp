<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fråga auditoriet - P2P</title>
    <!-- Tailwind CSS för styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome för ikoner -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- QRCode.js för att generera QR-koder -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <!-- PeerJS för direktkommunikation (ersätter Firebase) -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <!-- Chart.js för cirkeldiagram -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;800&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
        }
        
        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.9) translateY(10px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
        .answer-card {
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        .tab-btn { transition: all 0.3s ease; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 sm:p-8 relative">

    <!-- Status-indikator för P2P anslutning -->
    <div id="connection-status" class="fixed top-4 left-4 flex items-center space-x-2 text-xs font-mono opacity-50">
        <div id="status-dot" class="w-2 h-2 rounded-full bg-red-500"></div>
        <span id="status-text">Ej ansluten</span>
    </div>

    <!-- VY 1: SKAPA FRÅGA -->
    <div id="view-create" class="w-full max-w-3xl flex flex-col items-center text-center space-y-8">
        <div class="space-y-2">
            <h1 class="text-4xl md:text-6xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-emerald-400 pb-2">
                Fråga auditoriet
            </h1>
            <p class="text-slate-400 text-lg">Direktkommunikation via webbläsaren (ingen Firebase behövs).</p>
        </div>
        
        <div class="w-full bg-slate-800 p-6 md:p-8 rounded-2xl shadow-2xl border border-slate-700">
            <div class="flex justify-center mb-6 w-full">
                <div class="bg-slate-900/80 p-1.5 rounded-xl flex w-full max-w-md border border-slate-700">
                    <button id="tab-open" onclick="setQuestionType('open')" class="tab-btn flex-1 py-2.5 text-sm md:text-base rounded-lg bg-blue-600 text-white font-semibold">
                        <i class="fas fa-comment-dots mr-2"></i> Öppen
                    </button>
                    <button id="tab-poll" onclick="setQuestionType('poll')" class="tab-btn flex-1 py-2.5 text-sm md:text-base rounded-lg text-slate-400 hover:text-white">
                        <i class="fas fa-chart-pie mr-2"></i> Omröstning
                    </button>
                </div>
            </div>

            <input type="text" id="question-input" 
                class="w-full bg-slate-700 text-white text-xl md:text-2xl rounded-xl p-4 border border-slate-600 focus:border-blue-500 outline-none"
                placeholder="Skriv din fråga här...">
            
            <div id="poll-options-container" class="hidden w-full mt-6 space-y-3 bg-slate-900/40 p-5 rounded-xl">
                <div id="poll-options-list" class="space-y-3 w-full"></div>
                <button onclick="addPollOption()" class="text-blue-400 hover:text-blue-300 text-sm mt-4">
                    <i class="fas fa-plus mr-2"></i> Lägg till alternativ
                </button>
            </div>

            <button id="start-btn" onclick="startPresentation()" 
                class="mt-8 w-full md:w-auto bg-blue-500 hover:bg-blue-600 text-white font-semibold py-3 px-8 rounded-xl text-lg transition-all">
                Starta Presentation <i class="fas fa-arrow-right ml-2"></i>
            </button>
        </div>
    </div>

    <!-- VY 2: VISA QR-KOD -->
    <div id="view-qr" class="hidden w-full max-w-5xl flex flex-col items-center text-center space-y-12">
        <h1 id="qr-question-display" class="text-4xl md:text-6xl font-bold"></h1>
        <div class="flex flex-col md:flex-row items-center justify-center gap-12 bg-slate-800 p-8 rounded-3xl border border-slate-700 w-full shadow-2xl">
            <div id="qrcode-large" class="bg-white p-4 rounded-xl"></div>
            <div class="text-left space-y-4">
                <p class="text-xl text-slate-300">Skanna för att svara direkt i mobilen:</p>
                <p id="url-display" class="text-blue-400 font-mono bg-slate-900 p-3 rounded-lg border border-slate-700 text-sm break-all"></p>
                <div class="flex items-center space-x-2 text-emerald-400">
                    <i class="fas fa-users"></i>
                    <span id="connected-count">0 deltagare anslutna</span>
                </div>
                <button onclick="showResultsView()" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-4 rounded-xl text-xl">
                    Visa Svar <i class="fas fa-chart-bar ml-2"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- VY 3: RESULTAT -->
    <div id="view-results" class="hidden w-full max-w-6xl flex flex-col items-center">
        <div class="w-full flex justify-between mb-4">
            <button onclick="location.reload()" class="text-slate-400 hover:text-white"><i class="fas fa-redo mr-2"></i> Återställ</button>
            <span id="results-count" class="text-slate-400">0 svar mottagna</span>
        </div>
        <div class="w-full bg-slate-800 rounded-3xl p-8 border border-slate-700 min-h-[60vh] shadow-2xl">
            <h1 id="results-question-display" class="text-3xl font-bold mb-8"></h1>
            <div id="answers-grid" class="flex flex-wrap gap-4"></div>
            <div id="chart-container" class="hidden h-[450px] w-full flex justify-center">
                <canvas id="results-chart"></canvas>
            </div>
        </div>
    </div>

    <!-- DELTAGARVY (PUBLIKENS MOBIL) -->
    <div id="view-audience" class="hidden w-full max-w-md flex flex-col items-center space-y-6">
        <div class="w-full bg-slate-800 p-8 rounded-3xl border border-slate-700 shadow-2xl">
            <h2 id="audience-question-display" class="text-2xl font-bold mb-6 text-center">Väntar på fråga...</h2>
            
            <div id="audience-form" class="hidden">
                <div id="audience-open-container">
                    <textarea id="audience-input" class="w-full bg-slate-700 text-white p-4 rounded-xl mb-4 border border-slate-600 focus:border-blue-500 outline-none" rows="4" placeholder="Ditt svar..."></textarea>
                    <button onclick="sendAnswer()" class="w-full bg-blue-500 py-4 rounded-xl font-bold text-lg hover:bg-blue-600 transition-colors">Skicka svar</button>
                </div>
                <div id="audience-poll-container" class="hidden flex flex-col gap-3"></div>
            </div>

            <div id="audience-loading" class="flex flex-col items-center py-8">
                <i class="fas fa-circle-notch fa-spin text-3xl text-blue-500 mb-4"></i>
                <p class="text-slate-400">Ansluter till presentatören...</p>
            </div>
        </div>
    </div>

    <!-- TACK-VY -->
    <div id="view-thanks" class="hidden text-center space-y-4">
        <div class="text-6xl text-emerald-500 mb-4"><i class="fas fa-check-circle"></i></div>
        <h2 class="text-3xl font-bold">Tack för ditt svar!</h2>
        <p class="text-slate-400">Ditt svar har skickats direkt till skärmen.</p>
    </div>

    <script>
        let peer = null;
        let conn = null; // För deltagare
        let connections = []; // För presentatör
        let sessionId = null;
        let questionData = null;
        let answers = [];
        let createMode = 'open';
        let chartInstance = null;

        // --- NAVIGATION ---
        function showView(name) {
            ['create', 'qr', 'results', 'audience', 'thanks'].forEach(v => 
                document.getElementById('view-' + v).classList.add('hidden'));
            document.getElementById('view-' + name).classList.remove('hidden');
        }

        // --- SKAPA FRÅGA ---
        function setQuestionType(type) {
            createMode = type;
            document.getElementById('tab-open').className = `tab-btn flex-1 py-2.5 rounded-lg font-semibold ${type === 'open' ? 'bg-blue-600 text-white' : 'text-slate-400'}`;
            document.getElementById('tab-poll').className = `tab-btn flex-1 py-2.5 rounded-lg font-semibold ${type === 'poll' ? 'bg-emerald-600 text-white' : 'text-slate-400'}`;
            document.getElementById('poll-options-container').classList.toggle('hidden', type === 'open');
            if(type === 'poll' && document.getElementById('poll-options-list').children.length === 0) {
                addPollOption(); addPollOption();
            }
        }

        function addPollOption() {
            const list = document.getElementById('poll-options-list');
            const input = document.createElement('input');
            input.className = "poll-option w-full bg-slate-700 text-white p-3 rounded-lg border border-slate-600 mb-2 focus:border-emerald-500 outline-none";
            input.placeholder = "Alternativ " + (list.children.length + 1);
            list.appendChild(input);
        }

        // --- PRESENTATÖR LOGIK ---
        function startPresentation() {
            const qText = document.getElementById('question-input').value.trim();
            if(!qText) return alert("Skriv en fråga!");

            document.getElementById('start-btn').disabled = true;
            document.getElementById('start-btn').innerText = "Initierar P2P...";

            // Skapa ett unikt ID för denna session
            sessionId = 'ASK-' + Math.random().toString(36).substring(2, 7).toUpperCase();
            
            // Initiera PeerJS som "Host"
            peer = new Peer(sessionId);

            peer.on('open', (id) => {
                updateStatus(true, "Väntar på deltagare...");
                
                const qObj = { 
                    text: qText, 
                    type: createMode, 
                    options: createMode === 'poll' ? Array.from(document.querySelectorAll('.poll-option')).map(i => i.value.trim()).filter(v => v) : []
                };
                questionData = qObj;

                setupQRView(id, qObj);
            });

            peer.on('connection', (c) => {
                connections.push(c);
                updateConnectedCount();
                
                c.on('open', () => {
                    // Skicka frågan till deltagaren så fort de ansluter
                    c.send({ type: 'QUESTION', data: questionData });
                });

                c.on('data', (data) => {
                    if(data.type === 'ANSWER') {
                        handleNewAnswer(data.val);
                    }
                });
            });

            peer.on('error', (err) => {
                alert("Ett anslutningsfel uppstod. Prova att ladda om sidan.");
                location.reload();
            });
        }

        function setupQRView(id, q) {
            document.getElementById('qr-question-display').innerText = q.text;
            const url = window.location.origin + window.location.pathname + "?join=" + id;
            document.getElementById('url-display').innerText = url;
            
            document.getElementById('qrcode-large').innerHTML = "";
            new QRCode(document.getElementById('qrcode-large'), { text: url, width: 220, height: 220 });
            showView('qr');
        }

        function handleNewAnswer(val) {
            answers.push(val);
            document.getElementById('results-count').innerText = answers.length + " svar mottagna";
            
            if(questionData.type === 'poll') {
                updateChart();
            } else {
                const grid = document.getElementById('answers-grid');
                const div = document.createElement('div');
                div.className = "answer-card bg-slate-700 p-4 rounded-xl border border-slate-600 shadow-lg max-w-xs";
                div.innerText = val;
                grid.prepend(div);
            }
        }

        function showResultsView() {
            document.getElementById('results-question-display').innerText = questionData.text;
            if(questionData.type === 'poll') {
                document.getElementById('chart-container').classList.remove('hidden');
                document.getElementById('answers-grid').classList.add('hidden');
                updateChart();
            }
            showView('results');
        }

        function updateChart() {
            const opts = questionData.options;
            const counts = opts.map(o => answers.filter(a => a === o).length);
            
            if(chartInstance) {
                chartInstance.data.datasets[0].data = counts;
                chartInstance.update();
            } else {
                const ctx = document.getElementById('results-chart').getContext('2d');
                chartInstance = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: opts,
                        datasets: [{
                            label: 'Antal röster',
                            data: counts,
                            backgroundColor: '#3b82f6',
                            borderRadius: 8
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: { 
                            y: { beginAtZero: true, ticks: { stepSize: 1, color: '#94a3b8' }, grid: { color: '#334155' } },
                            x: { ticks: { color: '#94a3b8' }, grid: { display: false } }
                        }
                    }
                });
            }
        }

        // --- DELTAGARE LOGIK ---
        function initAudience() {
            const params = new URLSearchParams(window.location.search);
            const hostId = params.get('join');
            if(!hostId) return;

            showView('audience');
            peer = new Peer(); // Skapa slumpmässigt ID för deltagaren

            peer.on('open', () => {
                conn = peer.connect(hostId);
                
                conn.on('open', () => {
                    updateStatus(true, "Ansluten till presentation");
                });

                conn.on('data', (msg) => {
                    if(msg.type === 'QUESTION') {
                        renderAudienceForm(msg.data);
                    }
                });

                conn.on('close', () => {
                    alert("Anslutningen till presentatören avbröts.");
                    location.reload();
                });
            });
        }

        function renderAudienceForm(q) {
            document.getElementById('audience-loading').classList.add('hidden');
            document.getElementById('audience-form').classList.remove('hidden');
            document.getElementById('audience-question-display').innerText = q.text;

            if(q.type === 'poll') {
                document.getElementById('audience-open-container').classList.add('hidden');
                const cont = document.getElementById('audience-poll-container');
                cont.innerHTML = "";
                cont.classList.remove('hidden');
                q.options.forEach(o => {
                    const b = document.createElement('button');
                    b.className = "bg-slate-700 p-4 rounded-xl hover:bg-slate-600 text-left border border-slate-600 transition-all active:scale-95";
                    b.innerText = o;
                    b.onclick = () => sendAnswer(o);
                    cont.appendChild(b);
                });
            }
        }

        function sendAnswer(val) {
            const answer = val || document.getElementById('audience-input').value.trim();
            if(!answer) return;

            if(conn && conn.open) {
                conn.send({ type: 'ANSWER', val: answer });
                showView('thanks');
            } else {
                alert("Anslutningen förlorades. Prova att ladda om.");
            }
        }

        // --- UTILS ---
        function updateStatus(online, text) {
            document.getElementById('status-dot').className = `w-2 h-2 rounded-full ${online ? 'bg-emerald-500' : 'bg-red-500'}`;
            document.getElementById('status-text').innerText = text;
        }

        function updateConnectedCount() {
            document.getElementById('connected-count').innerText = connections.length + " deltagare anslutna";
        }

        window.onload = () => {
            initAudience();
            // Om vi inte är i deltagarläge, visa skapa-vyn
            const params = new URLSearchParams(window.location.search);
            if(!params.get('join')) showView('create');
        };
    </script>
</body>
</html>
