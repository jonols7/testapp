<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fråga auditoriet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
        @keyframes popIn { 0% { opacity: 0; transform: scale(0.9) translateY(10px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }
        .answer-card { animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .chart-toggle.active { background-color: #3b82f6; color: white; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <!-- Laddningsskärm -->
    <div id="loader" class="flex flex-col items-center justify-center space-y-4">
        <i class="fas fa-circle-notch fa-spin text-4xl text-blue-500"></i>
        <p class="text-slate-400">Ansluter till servern...</p>
    </div>

    <!-- Felmeddelande -->
    <div id="error-message" class="hidden fixed top-4 left-1/2 transform -translate-x-1/2 bg-red-500 text-white px-6 py-3 rounded-lg shadow-xl z-50 flex items-center space-x-3">
        <i class="fas fa-exclamation-triangle"></i>
        <span id="error-text">Ett fel uppstod.</span>
        <button onclick="hideError()" class="ml-4"><i class="fas fa-times"></i></button>
    </div>

    <!-- VY 1: SKAPA FRÅGA -->
    <div id="view-create" class="hidden w-full max-w-3xl flex flex-col items-center space-y-6">
        <h1 class="text-4xl font-bold text-blue-400">Fråga auditoriet</h1>
        <div class="w-full bg-slate-800 p-8 rounded-2xl border border-slate-700 shadow-2xl">
            <div class="flex mb-4 bg-slate-900 p-1 rounded-lg">
                <button id="btn-open" onclick="setMode('open')" class="flex-1 py-2 rounded-md bg-blue-600">Öppen fråga</button>
                <button id="btn-poll" onclick="setMode('poll')" class="flex-1 py-2 rounded-md text-slate-400">Omröstning</button>
            </div>
            <input type="text" id="question-input" class="w-full bg-slate-900 p-4 rounded-xl border border-slate-700 text-white mb-4 outline-none focus:ring-2 focus:ring-blue-500" placeholder="Skriv din fråga här...">
            
            <div id="poll-options" class="hidden space-y-2 mb-6">
                <p class="text-slate-400 text-xs font-bold uppercase">Alternativ</p>
                <input type="text" class="poll-opt w-full bg-slate-900 p-3 rounded-lg border border-slate-700 text-white" placeholder="Alternativ 1">
                <input type="text" class="poll-opt w-full bg-slate-900 p-3 rounded-lg border border-slate-700 text-white" placeholder="Alternativ 2">
                <div id="extra-opts" class="space-y-2"></div>
                <button onclick="addOpt()" class="text-blue-400 text-sm hover:underline">+ Lägg till fler</button>
            </div>

            <button onclick="startPresentation()" class="w-full bg-blue-600 hover:bg-blue-700 py-4 rounded-xl font-bold text-xl transition-all shadow-lg shadow-blue-600/20">Starta</button>
        </div>
        <div id="history-list" class="w-full max-w-md space-y-2"></div>
    </div>

    <!-- VY 2: RESULTAT & QR -->
    <div id="view-results" class="hidden w-full max-w-6xl flex flex-col items-center space-y-8">
        <h2 id="display-question" class="text-3xl md:text-5xl font-extrabold text-center leading-tight"></h2>
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8 w-full">
            <div class="lg:col-span-1 bg-white p-6 rounded-2xl flex flex-col items-center shadow-2xl h-fit">
                <div id="qrcode"></div>
                <p class="text-slate-900 font-bold mt-4 text-xs">SKANNA FÖR ATT SVARA</p>
                <p id="live-count" class="text-blue-600 font-black mt-2 text-3xl">0 svar</p>
                <button onclick="location.href=location.pathname" class="mt-8 text-slate-400 hover:text-slate-600 text-xs uppercase font-bold tracking-widest">Avsluta</button>
            </div>
            <div class="lg:col-span-3 relative">
                <!-- DIAGRAMVÄXLARE -->
                <div id="chart-controls" class="hidden absolute top-0 right-0 flex space-x-2 z-10">
                    <button id="toggle-pie" onclick="switchChartType('pie')" class="chart-toggle active p-2 rounded-lg bg-slate-700 text-slate-300 hover:bg-slate-600 transition-colors">
                        <i class="fas fa-chart-pie"></i>
                    </button>
                    <button id="toggle-bar" onclick="switchChartType('bar')" class="chart-toggle p-2 rounded-lg bg-slate-700 text-slate-300 hover:bg-slate-600 transition-colors">
                        <i class="fas fa-chart-bar"></i>
                    </button>
                </div>

                <div id="answers-container" class="flex flex-wrap gap-3 content-start"></div>
                <div id="poll-container" class="hidden bg-slate-800 p-8 rounded-2xl border border-slate-700 shadow-xl h-[500px] flex items-center justify-center">
                    <canvas id="pollChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <!-- VY 3: DELTAGARE -->
    <div id="view-audience" class="hidden w-full max-w-md flex flex-col items-center space-y-6">
        <div class="bg-slate-800 p-8 rounded-3xl border border-slate-700 w-full shadow-2xl">
            <h2 id="audience-q" class="text-2xl font-bold mb-8 text-center"></h2>
            <div id="open-ui" class="hidden">
                <textarea id="audience-input" class="w-full bg-slate-900 p-4 rounded-xl border border-slate-700 text-white mb-6 outline-none focus:ring-2 focus:ring-blue-500" rows="4" placeholder="Skriv ditt svar..."></textarea>
                <button id="send-btn" onclick="submitAnswer()" class="w-full bg-blue-600 py-4 rounded-xl font-bold text-lg">Skicka svar</button>
            </div>
            <div id="poll-ui" class="hidden space-y-3"></div>
        </div>
    </div>

    <!-- VY 4: TACK -->
    <div id="view-thanks" class="hidden text-center space-y-4">
        <div class="w-20 h-20 bg-emerald-500/20 rounded-full flex items-center justify-center mx-auto mb-6">
            <i class="fas fa-check text-4xl text-emerald-500"></i>
        </div>
        <h2 class="text-3xl font-bold">Tack för ditt svar!</h2>
        <p class="text-slate-400">Resultaten visas på storbildsskärmen.</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.3.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/11.3.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.3.0/firebase-auth.js";

        // --- KONFIGURATION ---
        const firebaseConfig = {
            apiKey: "DIN_API_KEY",
            authDomain: "DITT_PROJEKT.firebaseapp.com",
            projectId: "DITT_PROJEKT",
            storageBucket: "DITT_PROJEKT.firebasestorage.app",
            messagingSenderId: "ID",
            appId: "APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = "menti-app-v2";

        let currentMode = 'open';
        let currentChartType = 'pie';
        let chart = null;
        let currentSId = new URLSearchParams(window.location.search).get('s');
        const chartColors = ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899', '#14b8a6', '#f43f5e', '#6366f1'];

        onAuthStateChanged(auth, async (user) => {
            if (!user) { try { await signInAnonymously(auth); } catch(e) {} return; }
            document.getElementById('loader').classList.add('hidden');
            if (currentSId) loadSession(); else showCreate();
        });

        window.setMode = (m) => {
            currentMode = m;
            document.getElementById('btn-open').className = `flex-1 py-2 rounded-md ${m==='open'?'bg-blue-600':'text-slate-400'}`;
            document.getElementById('btn-poll').className = `flex-1 py-2 rounded-md ${m==='poll'?'bg-blue-600':'text-slate-400'}`;
            document.getElementById('poll-options').classList.toggle('hidden', m === 'open');
        };

        window.addOpt = () => {
            const i = document.createElement('input');
            i.className = "poll-opt w-full bg-slate-900 p-3 rounded-lg border border-slate-700 text-white";
            i.placeholder = "Nytt alternativ";
            document.getElementById('extra-opts').appendChild(i);
        };

        window.startPresentation = async () => {
            const q = document.getElementById('question-input').value.trim();
            if(!q) return;
            const opts = Array.from(document.querySelectorAll('.poll-opt')).map(i => i.value.trim()).filter(v => v);
            const id = Math.random().toString(36).substring(2, 8).toUpperCase();
            
            const sessionData = { 
                question: q, 
                type: currentMode, 
                options: currentMode === 'poll' ? opts : [], 
                answers: [], 
                createdAt: new Date().toISOString() 
            };

            try {
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'sessions', id), sessionData);
                saveHistory(id, q);
                window.location.search = `?s=${id}`;
            } catch(e) { window.showError("Kunde inte starta sessionen."); }
        };

        async function loadSession() {
            const snap = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'sessions', currentSId));
            if (!snap.exists()) return window.showError("Frågan hittades inte.");
            
            const data = snap.data();
            if (!/iPhone|Android/i.test(navigator.userAgent)) {
                showResults(data);
            } else {
                showAudience(data);
            }
        }

        window.switchChartType = (type) => {
            currentChartType = type;
            document.getElementById('toggle-pie').classList.toggle('active', type === 'pie');
            document.getElementById('toggle-bar').classList.toggle('active', type === 'bar');
            
            // Vi triggar en omritning genom att förstöra det gamla diagrammet
            if (chart) {
                chart.destroy();
                chart = null;
            }
            // Datan kommer uppdateras automatiskt via onSnapshot
        };

        function showResults(data) {
            document.getElementById('display-question').innerText = data.question;
            document.getElementById('view-results').classList.remove('hidden');
            if (data.type === 'poll') document.getElementById('chart-controls').classList.remove('hidden');
            
            new QRCode(document.getElementById('qrcode'), { text: window.location.href, width: 200, height: 200 });

            onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'sessions', currentSId), (snap) => {
                const updated = snap.data();
                const answers = updated.answers || [];
                document.getElementById('live-count').innerText = `${answers.length} svar`;

                if (updated.type === 'poll') {
                    renderChart(updated.options, answers);
                } else {
                    renderOpenAnswers(answers);
                }
            });
        }

        function renderOpenAnswers(answers) {
            const cont = document.getElementById('answers-container');
            cont.innerHTML = '';
            [...answers].reverse().forEach(a => {
                const d = document.createElement('div');
                d.className = "answer-card bg-slate-800 p-4 rounded-xl border border-slate-700 shadow-lg";
                d.innerText = a.text;
                cont.appendChild(d);
            });
        }

        function renderChart(opts, answers) {
            document.getElementById('poll-container').classList.remove('hidden');
            const counts = opts.map(o => answers.filter(a => a.text === o).length);
            
            const ctx = document.getElementById('pollChart').getContext('2d');

            if (chart && chart.config.type === currentChartType) {
                chart.data.labels = opts;
                chart.data.datasets[0].data = counts;
                chart.update();
            } else {
                if (chart) chart.destroy();
                
                const config = {
                    type: currentChartType,
                    data: {
                        labels: opts,
                        datasets: [{ 
                            data: counts, 
                            backgroundColor: chartColors,
                            borderColor: '#1e293b',
                            borderWidth: 2,
                            borderRadius: currentChartType === 'bar' ? 8 : 0
                        }]
                    },
                    options: { 
                        responsive: true, 
                        maintainAspectRatio: false,
                        plugins: { 
                            legend: { 
                                display: currentChartType === 'pie',
                                position: 'bottom',
                                labels: { color: '#f8fafc', font: { size: 14, weight: '600' }, padding: 20 }
                            } 
                        },
                        scales: currentChartType === 'bar' ? {
                            y: { beginAtZero: true, ticks: { color: '#94a3b8', stepSize: 1 } },
                            x: { ticks: { color: '#f8fafc' } }
                        } : {}
                    }
                };
                chart = new Chart(ctx, config);
            }
        }

        function showAudience(data) {
            document.getElementById('audience-q').innerText = data.question;
            document.getElementById('view-audience').classList.remove('hidden');
            if (data.type === 'poll') {
                const ui = document.getElementById('poll-ui');
                ui.innerHTML = '';
                ui.classList.remove('hidden');
                data.options.forEach(o => {
                    const b = document.createElement('button');
                    b.className = "w-full bg-slate-700 p-4 rounded-xl text-left border border-slate-600 hover:bg-slate-600 transition-all";
                    b.innerText = o;
                    b.onclick = () => window.submitAnswer(o);
                    ui.appendChild(b);
                });
            } else {
                document.getElementById('open-ui').classList.remove('hidden');
            }
        }

        window.submitAnswer = async (val = null) => {
            if (!val) val = document.getElementById('audience-input').value.trim();
            if (!val) return;
            
            try {
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'sessions', currentSId), {
                    answers: arrayUnion({ text: val, t: Date.now() + Math.random() })
                });
                document.getElementById('view-audience').classList.add('hidden');
                document.getElementById('view-thanks').classList.remove('hidden');
            } catch (e) { window.showError("Kunde inte skicka svar."); }
        };

        function showCreate() {
            document.getElementById('view-create').classList.remove('hidden');
            const hist = JSON.parse(localStorage.getItem('menti_hist_v2') || '[]');
            const list = document.getElementById('history-list');
            list.innerHTML = '';
            if (hist.length > 0) {
                list.innerHTML = '<p class="text-slate-500 text-xs font-bold uppercase mb-2">Historik</p>';
                hist.forEach(h => {
                    const b = document.createElement('button');
                    b.className = "w-full bg-slate-800/40 p-3 rounded-lg border border-slate-700 text-left text-sm flex justify-between items-center mb-2";
                    b.innerHTML = `<span>${h.q}</span> <i class="fas fa-chevron-right opacity-30"></i>`;
                    b.onclick = () => window.location.search = `?s=${h.id}`;
                    list.appendChild(b);
                });
            }
        }

        function saveHistory(id, q) {
            let hist = JSON.parse(localStorage.getItem('menti_hist_v2') || '[]');
            hist = [{id, q}, ...hist].filter((v,i,a)=>a.findIndex(t=>(t.id===v.id))===i).slice(0, 5);
            localStorage.setItem('menti_hist_v2', JSON.stringify(hist));
        }

        window.showError = (m) => {
            document.getElementById('error-text').innerText = m;
            document.getElementById('error-message').classList.remove('hidden');
            setTimeout(() => document.getElementById('error-message').classList.add('hidden'), 5000);
        };
    </script>
</body>
</html>
